name: Run Daily Sync Report

on:
  schedule:
    # Runs at 03:30 UTC every day.
    # This is 9:00 AM in your time (IST = UTC + 5:30).
    - cron: '00 4 * * *'
  
  workflow_dispatch: 
    # This line adds a "Run workflow" button so you can test it manually.

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas "redshift_connector[cffi]" jinja2

      - name: Run the sync report script
        env:
          # This line tells the script what the *real* keys are.
          # It fetches them from the GitHub "Secrets" vault.
          REDSHIFT_PASS: ${{ secrets.REDSHIFT_PASS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        
        # This is the command to run your Python file.
        run: python daily_sync_report.py
