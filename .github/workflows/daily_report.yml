name: Run Daily Sync Report

on:
  schedule:
    # Runs at 02:30 UTC every day.
    # This is 8:00 AM IST, giving GitHub Actions and Redshift enough buffer
    # to deliver the report closer to the intended 10:00 AM time.
    - cron: '30 2 * * *'
  
  workflow_dispatch: 
    # This line adds a "Run workflow" button so you can test it manually.

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas "redshift_connector[cffi]" jinja2

      - name: Run the sync report script
        env:
          # This line tells the script what the *real* keys are.
          # It fetches them from the GitHub "Secrets" vault.
          REDSHIFT_PASS: ${{ secrets.REDSHIFT_PASS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        
        # This is the command to run your Python file.
        run: python daily_sync_report.py

      - name: Persist sync history
        run: |
          if [ ! -f sync_report_history.csv ]; then
            echo "No sync history file was created."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sync_report_history.csv

          if git diff --cached --quiet; then
            echo "No sync history changes to commit."
            exit 0
          fi

          git commit -m "Update sync report history [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
